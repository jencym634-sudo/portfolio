name: Deploy to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: 🚀 Deploy to InfinityFree
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Generate production config
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          cat > config/config.php << PHPEOF
          <?php
          /**
           * Database Configuration (Production)
           * Auto-generated by GitHub Actions CI/CD pipeline.
           */

          // Production error settings
          error_reporting(0);
          ini_set('display_errors', '0');
          ini_set('log_errors', '1');

          define('DB_HOST', '${DB_HOST}');
          define('DB_USER', '${DB_USER}');
          define('DB_PASS', '${DB_PASS}');
          define('DB_NAME', '${DB_NAME}');

          // Establish MySQL connection
          \$conn = mysqli_connect(DB_HOST, DB_USER, DB_PASS, DB_NAME);

          // Check connection
          if (!\$conn) {
              die('Database connection failed.');
          }

          // Set charset to UTF-8
          mysqli_set_charset(\$conn, 'utf8mb4');

          // Start session if not already started
          if (session_status() === PHP_SESSION_NONE) {
              session_start();
          }
          PHPEOF

      - name: 📂 Ensure uploads directory exists
        run: mkdir -p uploads && touch uploads/.gitkeep

      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            .gitignore
            database.sql
            README.md
            .github/**
